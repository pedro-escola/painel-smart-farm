<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Painel Smart Farm</title>

	<link rel="stylesheet" href="assets/style.css">
	<script src="assets/main.js"></script>
</head>
<body>

	<div class="painel">
        <h2 style="color: #10b981; margin-bottom: 5px;">Smart Farm</h2>
        <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 20px;">Dashboard de Monitoramento</p>

        <div class="status-grid">
            <div class="card">
                <small>Temperatura</small>
                <div id="display-valor" class="valor">--°C</div>
            </div>
            <div class="card">
                <small>Bomba</small>
                <div id="led-bomba" class="bomba-led"></div>
                <small id="texto-bomba">OFF</small>
            </div>
        </div>

        <button class="btn-leitura" onclick="simularLeitura()">Realizar Leitura (Sensor 1)</button>
        
        <div id="log">Aguardando comando...</div>
    </div>
</body>

</html>
