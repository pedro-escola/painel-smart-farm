# basicamente o coisa padrão do github pages de static html :P

name: Deploy to Github Pages
on:
  push:
    paths: "src/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy all branches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      
      - name: Clone all branches
        run: |
          git checkout origin/main
          mkdir -p src/branch
          for branch in $(git branch -r | grep -v '\->'); do
            if [[ "$branch" == "origin/"* ]] && [[ "${branch#origin/}" != "${{ github.head_ref || github.ref_name }}" ]]; then
              echo "Cloning branch ${branch}!"
              true_branch="${branch#origin/}"
              git clone -b "$true_branch" --single-branch https://github.com/pedro-escola/painel-smart-farm.git "temp"
              mv temp/src src/branch/$true_branch
              rm -rf temp/
              echo "Cloned branch ${branch}!"
            fi
          done
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: './src'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
